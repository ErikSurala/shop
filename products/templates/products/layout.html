<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>E-shop</title>
</head>
<body>
    <h1>E-shop databázový projekt</h1>

    <nav>
        <a href="{% url 'index' %}">Úvod</a>

        {% if user.is_authenticated %}
            <a href="{% url 'moje_objednavky' %}">Moje objednávky</a>
            <a href="{% url 'logout' %}">Odhlásit</a>
        {% else %}
            <a href="{% url 'login' %}">Přihlášení</a>
        {% endif %}

        <a href="/admin/">Admin</a>
    </nav>

    <hr>

    {% block content %}
    {% endblock %}
</body>
</html>
